name: nexacon_sdk
description: Flutter SDK for Nexacon API - Authentication, Messaging, Calls, and IoT Device Management.
version: 1.0.0
homepage: https://docs.nexacon.com
repository: https://github.com/nexacon/nexacon-flutter-sdk

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  http: ^1.1.0
  json_annotation: ^4.8.0
  flutter_webrtc: ^0.9.48
  web_socket_client: ^0.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.0
  json_serializable: ^6.7.0

flutter:
  uses-material-design: true
